<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>洛克王国·世界 孵蛋查询</title>
    <meta
      name="description"
      content="输入尺寸和重量，快速查询最相似的洛克王国·世界孵蛋结果。"
    />
    <link rel="icon" type="image/png" href="./icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="global-loading" class="global-loading" hidden>
      <div class="loading-panel" role="status" aria-live="polite" aria-label="思考中">
        <div class="loading-spinner" aria-hidden="true"></div>
        <p>思考中...</p>
      </div>
    </div>

    <header class="hero-banner">
      <div class="hero-stars hero-stars-left" aria-hidden="true">✦</div>
      <div class="hero-stars hero-stars-right" aria-hidden="true">✦</div>
      <div class="hero-inner">
        <h1 class="hero-title">
          <span>洛克</span>
          <strong>小手册</strong>
        </h1>
        <div class="hero-ribbon">
          <span>⭐</span>
          <span>🥚 孵蛋查询功能</span>
          <span>⭐</span>
        </div>
      </div>
      <div class="hero-cloud hero-cloud-left" aria-hidden="true"></div>
      <div class="hero-cloud hero-cloud-right" aria-hidden="true"></div>
    </header>

    <main class="page-shell">
      <section class="dashboard-card">
        <section class="panel input-panel">
          <div class="panel-title">
            <span class="panel-line"></span>
            <h2>✎ 输入参数</h2>
            <span class="panel-line"></span>
          </div>

          <form id="query-form" class="query-form">
            <label class="field">
              <span>尺寸（m）</span>
              <input
                id="height-input"
                name="height"
                type="number"
                inputmode="decimal"
                min="0"
                step="0.01"
                placeholder="请输入尺寸（米）"
                required
              />
            </label>

            <label class="field">
              <span>重量（kg）</span>
              <input
                id="weight-input"
                name="weight"
                type="number"
                inputmode="decimal"
                min="0"
                step="0.001"
                placeholder="请输入重量"
                required
              />
            </label>

            <button type="submit" class="primary-button">🔍 开始查询</button>
          </form>
        </section>

        <section class="panel result-panel">
          <div class="panel-title">
            <span class="panel-line"></span>
            <h2>📊 查询结果</h2>
            <span class="panel-line"></span>
          </div>

          <div class="result-intro">
            根据您输入的尺寸和重量，系统会筛选出最相似的宠物结果：
          </div>

          <p id="status-message" class="status-message" aria-live="polite"></p>

          <section class="result-card" id="result-card" hidden>
            <div class="pet-avatar" aria-hidden="true">
              <span class="pet-face">🥚</span>
            </div>

            <div class="pet-main">
              <div class="pet-heading">
                <h3 id="result-name"></h3>
                <span id="confidence-badge" class="confidence-badge"></span>
              </div>
            </div>
          </section>
        </section>
      </section>

      <p class="footnote">本工具仅供参考，实际孵化结果以游戏内为准</p>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
